---
layout: default
title: Eric Holmes
---

<div class="post-list">
  {% for post in site.posts %}
  <article class="post-item">
    <div class="post-date">{{ post.date | date: "%B %-d, %Y" }}</div>
    <h2><a href="{{ post.url }}">{{ post.title }}</a></h2>
    <div class="post-excerpt">{{ post.excerpt | strip_html | truncatewords: 30 }}</div>
  </article>
  {% endfor %}
</div>
