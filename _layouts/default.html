<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
        <title>{{ page.title }}</title>
        <meta name="viewport" content="width=device-width">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

        <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">

        <link rel="stylesheet" href="/css/main.css">
        <link rel="stylesheet" href="/css/syntax.css">
        <link rel="alternate" type="application/rss+xml" title="Eric Holmes" href="/feed.xml">
    </head>
    <body>

        <div class="container">
          <header class="site-header">
            <a href="/" class="site-title">Eric Holmes</a>
            <nav class="site-nav">
              <a href="https://github.com/ejholmes">GitHub</a>
              <a href="https://keybase.io/ejholmes">Keybase</a>
              <a href="mailto:eric@ejholmes.io">Email</a>
            </nav>
          </header>

          <main class="content">
            {{ content }}
          </main>

          <footer class="site-footer">
            <p>Eric Holmes &middot; Infrastructure Engineer</p>
          </footer>
        </div>

        <script>
        // Add anchor links to headers
        document.querySelectorAll('.post-content h2[id], .post-content h3[id], .post-content h4[id]').forEach(heading => {
            const anchor = document.createElement('a');
            anchor.href = '#' + heading.id;
            anchor.className = 'header-anchor';
            anchor.textContent = '#';
            anchor.title = 'Copy link';
            anchor.addEventListener('click', async (e) => {
                e.preventDefault();
                const url = window.location.href.split('#')[0] + '#' + heading.id;
                await navigator.clipboard.writeText(url);
                history.pushState(null, null, '#' + heading.id);
                anchor.textContent = '✓';
                setTimeout(() => anchor.textContent = '#', 1500);
            });
            heading.appendChild(anchor);
        });
        </script>
    </body>
</html>
